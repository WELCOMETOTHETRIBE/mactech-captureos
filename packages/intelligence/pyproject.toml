[project]
name = "mactech-intelligence"
version = "0.1.0"
description = "Scoring, parsing, compliance matrix generation, LLM client abstraction."
requires-python = ">=3.12"
dependencies = [
    "anthropic>=0.39",
    "pydantic>=2.9",
    "pymupdf>=1.24",
    "pyyaml>=6.0",
    "tenacity>=9.0",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/mactech_intelligence"]

[tool.hatch.metadata]
allow-direct-references = true
