[project]
name = "mactech-db"
version = "0.1.0"
description = "Shared SQLAlchemy models and Alembic migrations for MacTech CaptureOS."
requires-python = ">=3.12"
dependencies = [
    "sqlalchemy[asyncio]>=2.0.36",
    "asyncpg>=0.29",
    "psycopg[binary]>=3.2",
    "alembic>=1.14",
    "pgvector>=0.3.6",
    "pydantic>=2.9",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/mactech_db"]

[tool.hatch.metadata]
allow-direct-references = true
