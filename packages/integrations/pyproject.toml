[project]
name = "mactech-integrations"
version = "0.1.0"
description = "External API clients: SAM.gov, USASpending, FPDS, Apify, SerpAPI, Anthropic, Voyage."
requires-python = ">=3.12"
dependencies = [
    "httpx>=0.27",
    "pydantic>=2.9",
    "tenacity>=9.0",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/mactech_integrations"]

[tool.hatch.metadata]
allow-direct-references = true
