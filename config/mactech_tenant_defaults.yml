  # High-moat track. Leads with the UFGS 25 05 11 / 25 08 11 clauses —
  # facility-related control systems cybersecurity work mandated inside
  # construction primes' solicitations, where the prime almost never has
  # a cleared cyber sub. Clearance (TS/SCI, SCIF) is intentionally NOT a
  # match filter here — Patrick is cleared, so we want to surface the
  # clause even when the spec is clearance-silent. The high_moat_score
  # column is what this search ranks against, not the general score.
  - name: Patrick — UFGS 25 / FRCS Cyber
    owner_slug: patrick-caruso
    filters:
      # Primary cyber NAICS plus the construction NAICS where UFGS 25
      # clauses typically appear (so we don't miss a construction prime's
      # design-build RFP that wraps cyber inside).
      naics: [541519, 541512, 541513, 518210, 236220, 237310, 237990, 238210]
      keywords:
        - "25 05 11"
        - "25 08 11"
        - UFGS 25
        - UFC 4-010-06
        - NIST SP 800-82
        - DoDI 8500.01
        - FRCS
        - UMCS
        - Facility-Related Control Systems
        - SCADA
        - OT cybersecurity
        - Platform Information Technology
        - PIT cyber
        - Civil Works
      # Capability-tag terms; surfaced by the detector but not used to
      # filter the saved-search match. Keeps clearance-silent UFGS 25 hits
      # in the result set.
      capability_keywords:
        - TS/SCI
        - SCIF
        - ISSM
        - ISSE
        - RMF Validator
        - 3PAO
      score_field: high_moat_score
    alert_threshold: 80
    alert_cadence: daily
    alert_channels: [email]

