# Agency & office intelligence.
#
# Priority agencies for FRCS/OT and direct-cyber work, plus the contact roles
# the pursuit engine recommends reaching (never fabricates individual names).
# Consumed by the decision engine (winability/strategic_value inputs) and, in
# Slice 7, by prime-target intelligence.

family: agency_offices
version: "2026.07.0"
effective_date: 2026-07-01

priority_agencies:
