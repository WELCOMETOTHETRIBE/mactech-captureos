[tool.uv.workspace]
members = [
    "apps/api",
    "apps/workers",
    "packages/db",
    "packages/integrations",
    "packages/intelligence",
]

[tool.uv]
dev-dependencies = [
    "ruff>=0.6.0",
    "mypy>=1.11",
    "pytest>=8.3",
    "pytest-asyncio>=0.24",
    "pytest-cov>=5.0",
]

[tool.ruff]
line-length = 100
target-version = "py312"
extend-exclude = [
    ".venv",
    "**/alembic/versions",
    "node_modules",
]

[tool.ruff.lint]
select = [
    "E",
    "F",
    "W",
    "I",
    "B",
    "UP",
    "SIM",
    "RUF",
    "ASYNC",
]
ignore = [
    "E501",    # line length — handled by the formatter
    "RUF001",  # ambiguous unicode in strings (em/en dashes, arrows in prose)
    "RUF002",  # ambiguous unicode in docstrings
    "RUF003",  # ambiguous unicode in comments
    "B008",    # function call in default arg — FastAPI's Depends() pattern
    "ASYNC109", # async function with a timeout parameter (intentional API shape)
]

[tool.ruff.lint.per-file-ignores]
"__init__.py" = ["F401"]
"alembic/env.py" = ["E402"]

[tool.ruff.format]
quote-style = "double"

[tool.mypy]
python_version = "3.12"
strict = true
exclude = [
    ".venv",
    "alembic/versions",
]

[[tool.mypy.overrides]]
module = [
    "celery.*",
    "pgvector.*",
]
ignore_missing_imports = true

[tool.pytest.ini_options]
asyncio_mode = "auto"
testpaths = ["apps", "packages"]
python_files = ["test_*.py", "*_test.py"]
# importlib import mode: the workspace has several same-named `tests/` dirs
# (packages/integrations/tests, apps/api/tests, …). The default prepend mode
# assumes a single top-level `tests` package and errors on the collision
# ("No module named 'tests.test_...'"); importlib imports each test file
# standalone, which is the modern recommended mode.
addopts = "--import-mode=importlib"
